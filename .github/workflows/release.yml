name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-24.04
            target_os: linux
            cpu: amd64
            archive_name: why-linux-amd64
          - os: ubuntu-24.04
            target_os: linux
            cpu: arm64
            archive_name: why-linux-arm64
            install_cross: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu
            nim_flags: --cpu:arm64 --os:linux --gcc.exe:aarch64-linux-gnu-gcc --gcc.linkerexe:aarch64-linux-gnu-gcc
          - os: macos-15-intel
            target_os: darwin
            cpu: amd64
            archive_name: why-darwin-amd64
          - os: macos-15
            target_os: darwin
            cpu: arm64
            archive_name: why-darwin-arm64

    steps:
      - uses: actions/checkout@v6

      - name: Install Nim
        uses: jiro4989/setup-nim-action@v2
        with:
          nim-version: '2.2.6'

      - name: Install Dependencies
        run: nimble install -y cligen

      - name: Install Cross-compiler (Linux ARM64 only)
        if: matrix.install_cross != ''
        run: ${{ matrix.install_cross }}

      - name: Build
        shell: bash
        run: |
          nim c -d:release ${{ matrix.nim_flags }} -o:why src/why.nim
          mv why ${{ matrix.archive_name }}

      - name: Create Archive
        run: tar czf ${{ matrix.archive_name }}.tar.gz ${{ matrix.archive_name }}

      - name: Release to GitHub
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: ${{ matrix.archive_name }}.tar.gz
          prerelease: ${{ contains(github.ref, '-') }}

  update-homebrew:
    needs: build
    runs-on: ubuntu-latest
    # Run only for stable releases (tags without hyphens)
    if: startsWith(github.ref, 'refs/tags/') && !contains(github.ref, '-')
    steps:
      - name: Checkout why-cli repository (for scripts)
        uses: actions/checkout@v4

      - name: Checkout tap repository
        uses: actions/checkout@v4
        with:
          repository: akriaueno/homebrew-tap
          token: ${{ secrets.GH_PERSONAL_ACCESS_TOKEN }}
          path: homebrew-tap

      - name: Calculate SHA256 of Source Code
        id: shasum
        run: |
          TAG_NAME=${{ github.ref_name }}
          # URL for the source code archive generated by GitHub
          SOURCE_URL="https://github.com/akriaueno/why-cli/archive/refs/tags/${TAG_NAME}.tar.gz"
          
          echo "Downloading source from $SOURCE_URL"
          curl -L -o source.tar.gz "$SOURCE_URL"
          
          # Calculate SHA256 hash
          SHA256=$(sha256sum source.tar.gz | awk '{print $1}')
          
          echo "sha=$SHA256" >> $GITHUB_OUTPUT
          echo "url=$SOURCE_URL" >> $GITHUB_OUTPUT

      - name: Generate Formula
        run: |
          # Call the generation script
          # Arguments: VERSION, URL, SHA256
          bash .github/scripts/generate_formula.sh \
            "${{ github.ref_name }}" \
            "${{ steps.shasum.outputs.url }}" \
            "${{ steps.shasum.outputs.sha }}" > homebrew-tap/why.rb

          # Log the generated content for verification
          echo "=== Generated Formula ==="
          cat homebrew-tap/why.rb
          echo "========================="

      - name: Push to Tap Repository
        working-directory: homebrew-tap
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add why.rb
          
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update why formula to ${{ github.ref_name }} (source build)"
            git push origin main
  bottle:
    needs: update-homebrew
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-15
            runner_os: macOS
          - os: macos-15-intel
            runner_os: macOS
          - os: ubuntu-24.04
            runner_os: Linux

    steps:
      - name: Checkout tap repository
        uses: actions/checkout@v4
        with:
          repository: akriaueno/homebrew-tap
          token: ${{ secrets.GH_PERSONAL_ACCESS_TOKEN }}
          path: homebrew-tap

      - name: Install Homebrew (Linux)
        if: matrix.runner_os == 'Linux'
        run: |
          /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
          echo "/home/linuxbrew/.linuxbrew/bin" >> $GITHUB_PATH
          echo "/home/linuxbrew/.linuxbrew/sbin" >> $GITHUB_PATH

      - name: Setup Homebrew environment
        run: |
          if [ "${{ matrix.runner_os }}" = "Linux" ]; then
            eval "$(/home/linuxbrew/.linuxbrew/bin/brew shellenv)"
          else
            eval "$(brew shellenv)"
          fi
          echo "$HOMEBREW_PREFIX/bin" >> $GITHUB_PATH
          echo "$HOMEBREW_PREFIX/sbin" >> $GITHUB_PATH

      - name: Build bottle
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          ROOT_URL="https://github.com/akriaueno/why-cli/releases/download/${TAG_NAME}"
          brew update
          brew tap akriaueno/tap
          brew install --build-bottle akriaueno/tap/why
          brew bottle --root-url="$ROOT_URL" --json akriaueno/tap/why

      - name: Upload bottle artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bottles-${{ matrix.os }}
          path: |
            *.bottle.tar.gz
            *.bottle.json

  merge-bottles:
    needs: bottle
    runs-on: macos-15
    steps:
      - name: Checkout tap repository
        uses: actions/checkout@v4
        with:
          repository: akriaueno/homebrew-tap
          token: ${{ secrets.GH_PERSONAL_ACCESS_TOKEN }}
          path: homebrew-tap

      - name: Download bottle artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: bottles-*
          merge-multiple: true
          path: bottles

      - name: Merge bottle JSON into formula
        working-directory: homebrew-tap
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          ROOT_URL="https://github.com/akriaueno/why-cli/releases/download/${TAG_NAME}"
          brew update
          brew tap akriaueno/tap
          brew bottle --merge --write --no-commit --root-url="$ROOT_URL" ../bottles/*.bottle.json

      - name: Commit bottle block
        working-directory: homebrew-tap
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet; then
            echo "No changes to commit."
          else
            git add .
            git commit -m "Add bottles for ${{ github.ref_name }}"
            git push origin main
          fi

      - name: Upload bottles to GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          gh release upload "${TAG_NAME}" bottles/*.bottle.tar.gz --clobber
