name: CI
permissions:
  contents: read

on:
  pull_request:
    branches:
      - develop
  push:
    branches:
      - develop
  workflow_dispatch:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Nim
        uses: jiro4989/setup-nim-action@v2
        with:
          nim-version: '2.2.6'

      - name: Cache Nimble and Nim
        uses: actions/cache@v4
        with:
          path: |
            ~/.nimble
            ~/.cache/nim
          key: ${{ runner.os }}-nim-2.2.6-nimble-${{ hashFiles('nimble.lock') }}
          restore-keys: |
            ${{ runner.os }}-nim-2.2.6-nimble-

      - name: Install Dependencies
        run: nimble install -y --depsOnly

      - name: Run Tests
        run: nimble test

  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Run E2E Tests
        run: ./tests/e2e/run.sh
        env:
          E2E_JOBS: 2
